
services:
  mongo:
    image: mongo:4.4 #Parece que mi computadora no pudo con la V7
    #image: mongo:7
    container_name: peer-review-mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: LeoCra
      MONGO_INITDB_DATABASE: peer_review
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongo localhost:27017/test --quiet #Cambios por la V.
      #test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  db:
    image: mariadb:10.11
    container_name: peer-review-db
    environment:
      MYSQL_ROOT_PASSWORD: LeoCra
      MYSQL_DATABASE: peer_review
    volumes:
      - db_data:/var/lib/mysql
      - ./backend/database.sql:/docker-entrypoint-initdb.d/database.sql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  backend:
    build: ./backend
    container_name: peer-review-backend
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: LeoCra
      DB_NAME: peer_review
      JWT_SECRET: peer-review-secret-key
      PORT: 3000
      MONGO_HOST: mongo
      MONGO_USER: root
      MONGO_PASSWORD: LeoCra
      MONGO_DB: peer_review
    depends_on:
      db:
        condition: service_healthy
      mongo:
        condition: service_healthy
    ports:
      - "3000:3000"
    volumes:
      - uploads:/app/uploads

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: peer-review-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://backend:3000
    stdin_open: true
    tty: true

volumes:
  db_data:
  mongo_data:
  uploads: